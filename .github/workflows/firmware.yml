name: firmware

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  generated-headers:
    name: generated headers in sync with schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install codegen dependencies
        run: pip install -r firmware/tools/message_gen/requirements.txt

      - name: Verify committed headers match their schema
        run: python firmware/tools/message_gen/check.py

  ioc-drift:
    name: generated firmware in sync with .ioc
    # Regenerates from the .ioc with STM32CubeMX and fails if the committed
    # generated code drifted from what the .ioc produces. Needs a PRIVATE image
    # containing CubeMX + the ST-licensed FW_H7 pack (see firmware/cubemx.Dockerfile).
    # Skipped until the CUBEMX_IMAGE repo variable is set, so it never blocks the
    # build for forks or a repo that hasn't provisioned the image.
    if: ${{ vars.CUBEMX_IMAGE != '' }}
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.CUBEMX_IMAGE }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.CUBEMX_IMAGE_TOKEN }}
    steps:
      # submodules: true (not recursive) fetches STM32CubeH7 — the firmware pack —
      # at its pinned tag, without dragging in its ~40 eval-board BSP submodules.
      # regen-cube.sh then populates just the HAL/CMSIS ones CubeMX needs.
      - uses: actions/checkout@v4
        with:
          submodules: true

      # The job runs as root inside the container; mark the checkout trusted so
      # git operations don't bail on "dubious ownership".
      - name: Trust the checkout
        run: git config --global --add safe.directory '*'

      # STM32CUBEMX comes from the image's ENV; regen-cube.sh links the pack in
      # from the submodule and wraps CubeMX in xvfb-run (no display in CI).
      - name: Regenerate from the .ioc and fail on drift
        run: firmware/Scripts/regen-cube.sh --check

  build:
    name: build (${{ matrix.config }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build toolchain image
        uses: docker/build-push-action@v6
        with:
          context: firmware
          load: true
          tags: stm32-dyno-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ${{ matrix.config }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo:z" -w /repo/firmware \
            --user "$(id -u):$(id -g)" -e HOME=/tmp \
            stm32-dyno-builder:latest \
            bash -lc "python3 tools/message_gen/generate.py && cmake --preset ${{ matrix.config }} -B build-docker/${{ matrix.config }} && cmake --build build-docker/${{ matrix.config }}"

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.config }}
          path: |
            firmware/build-docker/${{ matrix.config }}/*.elf
            firmware/build-docker/${{ matrix.config }}/*.hex
            firmware/build-docker/${{ matrix.config }}/*.bin
            firmware/build-docker/${{ matrix.config }}/*.map
          if-no-files-found: error
