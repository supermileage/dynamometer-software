name: firmware

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  generated-headers:
    name: generated headers in sync with schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install codegen dependencies
        run: pip install -r firmware/tools/message_gen/requirements.txt

      - name: Verify committed headers match their schema
        run: python firmware/tools/message_gen/check.py

  # The firmware's hardware-independent logic (USB RX ring, frame parser, sysconfig store)
  # compiled with the runner's native gcc and run as an ordinary process — no board, no
  # ARM toolchain. See firmware/tests/CMakeLists.txt.
  unit-tests:
    name: unit tests (logic, host-compiled)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S firmware/tests -B firmware/tests/build

      - name: Build
        run: cmake --build firmware/tests/build -j

      - name: Run
        run: ctest --test-dir firmware/tests/build --output-on-failure

  build:
    name: build (${{ matrix.config }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build toolchain image
        uses: docker/build-push-action@v6
        with:
          context: firmware
          load: true
          tags: stm32-dyno-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ${{ matrix.config }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo:z" -w /repo/firmware \
            --user "$(id -u):$(id -g)" -e HOME=/tmp \
            stm32-dyno-builder:latest \
            bash -lc "python3 tools/message_gen/generate.py && cmake --preset ${{ matrix.config }} -B build-docker/${{ matrix.config }} && cmake --build build-docker/${{ matrix.config }}"

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.config }}
          path: |
            firmware/build-docker/${{ matrix.config }}/*.elf
            firmware/build-docker/${{ matrix.config }}/*.hex
            firmware/build-docker/${{ matrix.config }}/*.bin
            firmware/build-docker/${{ matrix.config }}/*.map
          if-no-files-found: error
