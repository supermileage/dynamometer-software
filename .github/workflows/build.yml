name: build

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  codegen:
    name: generated C# in sync with schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install codegen dependencies
        run: pip install -r tools/message_gen/requirements.txt

      - name: Verify committed Messages.cs matches the schema
        run: python tools/message_gen/check.py

  format:
    name: csharpier formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Check formatting (CSharpier)
        run: dotnet csharpier check .

  build:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Dyno.slnx

      - name: Build
        run: dotnet build Dyno.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Dyno.slnx -c Release --no-build

      - name: Publish app (${{ matrix.rid }})
        run: dotnet publish src/Dyno.App/Dyno.App.csproj -c Release -r ${{ matrix.rid }} --self-contained -o publish/${{ matrix.rid }}

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: dyno-app-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}
          if-no-files-found: error
