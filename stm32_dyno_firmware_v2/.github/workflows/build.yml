name: build

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  generated-headers:
    name: generated headers in sync with schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install codegen dependencies
        run: pip install -r tools/message_gen/requirements.txt

      - name: Verify committed headers match their schema
        run: python tools/message_gen/check.py

  build:
    name: build (${{ matrix.config }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build toolchain image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: stm32-dyno-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ${{ matrix.config }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work:z" -w /work \
            --user "$(id -u):$(id -g)" -e HOME=/tmp \
            stm32-dyno-builder:latest \
            bash -lc "python3 tools/message_gen/generate.py && cmake --preset ${{ matrix.config }} -B /work/build-docker/${{ matrix.config }} && cmake --build /work/build-docker/${{ matrix.config }}"

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.config }}
          path: |
            build-docker/${{ matrix.config }}/*.elf
            build-docker/${{ matrix.config }}/*.hex
            build-docker/${{ matrix.config }}/*.bin
            build-docker/${{ matrix.config }}/*.map
          if-no-files-found: error
